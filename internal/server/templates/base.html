<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>testreg | Dev Console</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "outline": "#8b919d",
                "tertiary-container": "#40ba51",
                "surface": "#10141a",
                "on-surface": "#dfe2eb",
                "on-primary": "#00315c",
                "error": "#ffb4ab",
                "on-primary-container": "#003a6b",
                "surface-tint": "#a2c9ff",
                "secondary-fixed-dim": "#d8baff",
                "surface-variant": "#31353c",
                "secondary-container": "#5d2d9c",
                "surface-container-high": "#262a31",
                "secondary": "#d8baff",
                "outline-variant": "#414752",
                "primary-fixed-dim": "#a2c9ff",
                "on-primary-fixed": "#001c38",
                "on-surface-variant": "#c0c7d4",
                "inverse-surface": "#dfe2eb",
                "surface-container-highest": "#31353c",
                "secondary-fixed": "#eddcff",
                "on-primary-fixed-variant": "#004882",
                "inverse-primary": "#0060aa",
                "primary-fixed": "#d3e4ff",
                "surface-container": "#1c2026",
                "on-background": "#dfe2eb",
                "on-secondary-container": "#cda8ff",
                "tertiary": "#67df70",
                "surface-dim": "#10141a",
                "surface-bright": "#353940",
                "primary": "#a2c9ff",
                "error-container": "#93000a",
                "background": "#10141a",
                "on-tertiary-container": "#004411",
                "surface-container-lowest": "#0a0e14",
                "on-error-container": "#ffdad6",
                "on-secondary": "#430882",
                "surface-container-low": "#181c22",
                "tertiary-fixed-dim": "#67df70",
                "primary-container": "#58a6ff"
            },
            fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"],
                "mono": ["JetBrains Mono"]
            },
            borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
    },
}
</script>
<link rel="stylesheet" href="/static/style.css"/>
<style>
body { background-color: #10141a; color: #dfe2eb; font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="overflow-hidden">

<!-- Top Navigation Bar (48px) -->
<header class="h-12 w-full fixed top-0 z-50 bg-slate-950 flex items-center justify-between px-4 font-sans text-sm tracking-tight">
    <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
            <span class="text-blue-400 text-xl leading-none">◉</span>
            <span class="text-lg font-bold text-slate-100">testreg</span>
        </div>
        <div class="h-4 w-[1px] bg-outline-variant mx-1"></div>
        <span class="text-blue-400 font-semibold font-mono text-sm">{{.ProjectName}}</span>
    </div>
    <div class="flex items-center gap-2">
        <button id="scan-btn"
            class="bg-primary-container text-on-primary-container px-3 py-1 rounded-sm text-xs font-bold uppercase tracking-wider hover:brightness-110 transition-all flex items-center gap-2"
            hx-post="/api/scan"
            hx-target="#status-bar"
            hx-swap="outerHTML"
            hx-indicator="#scan-btn">
            <span class="material-symbols-outlined !text-[14px]">scan</span>
            <span>Scan</span>
            <span class="htmx-indicator ml-1 text-[10px]">...</span>
        </button>
        <div class="flex items-center ml-2 space-x-1">
            <button class="w-8 h-8 flex items-center justify-center text-slate-400 hover:bg-slate-800 transition-colors rounded">
                <span class="material-symbols-outlined">dark_mode</span>
            </button>
            <button class="w-8 h-8 flex items-center justify-center text-slate-400 hover:bg-slate-800 transition-colors rounded">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>
    </div>
</header>

<!-- Sidebar (200px) -->
<aside class="w-[200px] h-screen fixed left-0 top-0 pt-12 bg-slate-950 hidden md:flex flex-col z-40">
    <nav class="flex flex-col mt-2">
        {{range .Nav}}
        <a href="{{.Path}}"
            class="{{if .Active}}bg-blue-400/10 text-blue-400 border-l-[3px] border-blue-400{{else}}text-slate-400 border-l-[3px] border-transparent hover:bg-slate-900{{end}} h-10 flex items-center px-4 transition-all duration-200"
            hx-get="{{.Path}}"
            hx-target="#page-content"
            hx-swap="innerHTML"
            hx-push-url="{{.Path}}">
            <span class="material-symbols-outlined mr-3">{{.Icon}}</span>
            {{.Label}}
        </a>
        {{end}}
    </nav>
    <div class="mt-auto px-4 py-4">
        <div class="p-2 bg-surface-container-low rounded flex items-center gap-2">
            <span class="material-symbols-outlined text-slate-500 text-sm">terminal</span>
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">testreg</span>
                <span class="text-xs text-slate-400 font-mono">v{{.Version}}</span>
            </div>
        </div>
    </div>
</aside>

<!-- Main Content -->
<main class="pl-[200px] pt-12 pb-8 h-screen w-full bg-surface-container-lowest overflow-y-auto">
    <div id="page-content">
        {{.Content}}
    </div>
</main>

<!-- Status Bar (32px) -->
<footer id="status-bar" class="fixed bottom-0 w-full h-8 z-[60] flex items-center px-4 bg-slate-900 font-mono text-[11px] tabular-nums">
    <div class="flex items-center justify-between w-full">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-slate-400">Ready</span>
            </div>
            <div class="h-3 w-[1px] bg-slate-800"></div>
            <div class="flex items-center gap-3 text-slate-300">
                <span>{{.Status.TotalFeatures}} features</span>
                <span class="text-slate-600">•</span>
                <span>{{.Status.TotalTests}} tests</span>
                <span class="text-slate-600">•</span>
                <span class="text-emerald-400">{{.Status.AtTargetPct}}% at target</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <a href="/docs" class="text-slate-500 hover:text-white transition-colors">Docs</a>
            <div class="h-3 w-[1px] bg-slate-800"></div>
            <span class="text-slate-500">v{{.Version}}</span>
        </div>
    </div>
</footer>

<!-- Mobile Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 h-14 md:hidden bg-slate-950 border-t border-slate-800 flex justify-around items-center px-2">
    {{range .Nav}}
    <a href="{{.Path}}"
        class="flex flex-col items-center justify-center {{if .Active}}text-blue-400{{else}}text-slate-500{{end}} p-2"
        hx-get="{{.Path}}"
        hx-target="#page-content"
        hx-swap="innerHTML"
        hx-push-url="{{.Path}}">
        <span class="material-symbols-outlined">{{.Icon}}</span>
        <span class="text-[10px]">{{.Label}}</span>
    </a>
    {{end}}
</nav>

</body>
</html>
